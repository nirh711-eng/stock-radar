const SECTORS = {

const TICKERS_INIT = Object.keys(META);

const f   = (n,d=2)=>n==null?"—":Number(n).toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d});
const fv  = v=>!v?"—":v>=1e9?(v/1e9).toFixed(1)+"B":v>=1e6?(v/1e6).toFixed(1)+"M":(v/1e3).toFixed(0)+"K";
const pClr= v=>v==null?"#64748b":v>0?"#34d399":v<0?"#f87171":"#94a3b8";
const today=()=>new Date().toISOString().split("T")[0];
const weekAgo=()=>{const d=new Date();d.setDate(d.getDate()-7);return d.toISOString().split("T")[0];};

function getSession(){
  const ny=new Date(new Date().toLocaleString("en-US",{timeZone:"America/New_York"}));
  const d=ny.getDay(),t=ny.getHours()*60+ny.getMinutes();
  if(d===0||d===6) return{label:"Market Closed — Weekend",color:"#475569",code:"closed"};
  if(t>=240&&t<570)  return{label:"Pre-Market  04:00–09:30",color:"#fbbf24",code:"pre"};
  if(t>=570&&t<960)  return{label:"Market Open  09:30–16:00",color:"#34d399",code:"open"};
  if(t>=960&&t<1200) return{label:"After Hours  16:00–20:00",color:"#60a5fa",code:"after"};
  return{label:"Market Closed",color:"#475569",code:"closed"};
}

// ── API ──────────────────────────────────────────────────────────────────────

async function fetchYahoo(ticker){
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d`,{signal:AbortSignal.timeout(8000)});
    if(!r.ok) throw new Error();
    const j=await r.json();
    const m=j?.chart?.result?.[0]?.meta;
    if(!m?.regularMarketPrice) throw new Error();
    const price=m.regularMarketPrice, prev=m.chartPreviousClose??m.previousClose??null;
    const chg=price&&prev?price-prev:null, chgPct=chg&&prev?(chg/prev)*100:null;
    return{ticker,ok:true,src:"Yahoo",price,prev,chg,chgPct,
      pre:m.preMarketPrice??null,after:m.postMarketPrice??null,
      high:m.regularMarketDayHigh??null,low:m.regularMarketDayLow??null,vol:m.regularMarketVolume??null,
      name:m.longName??m.shortName??ticker};
  }catch(e){return{ticker,ok:false};}
}

async function fetchFinnhub(ticker){
  try{
    const r=await fetch(`${FINNHUB}/quote?symbol=${ticker}&token=${FKEY}`,{signal:AbortSignal.timeout(7000)});
    if(!r.ok) throw new Error();
    const d=await r.json();
    if(!d.c||d.c===0) throw new Error();
    return{ticker,ok:true,src:"Finnhub",price:d.c,prev:d.pc,chg:d.d,chgPct:d.dp,high:d.h,low:d.l,vol:null,pre:null,after:null};
  }catch(e){return{ticker,ok:false};}
}

async function fetchQuote(ticker){
  const y=await fetchYahoo(ticker);
  if(y.ok) return y;
  return fetchFinnhub(ticker);
}

async function fetchNewsYahoo(tickers){
  try{
    const url=`https://feeds.finance.yahoo.com/rss/2.0/headline?s=${tickers.slice(0,12).join(",")}&region=US&lang=en-US`;
    const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
    if(!r.ok) throw new Error();
    const text=await r.text();
    const doc=new DOMParser().parseFromString(text,"text/xml");
    return[...doc.querySelectorAll("item")].slice(0,40).map(item=>{
      const title=item.querySelector("title")?.textContent??"";
      const link =item.querySelector("link")?.textContent??"#";
      const pub  =item.querySelector("pubDate")?.textContent??"";
      const desc =item.querySelector("description")?.textContent?.replace(/<[^>]*>/g,"")??"";
      const when =pub?new Date(pub):null;
      const diff =when?Math.floor((Date.now()-when)/60000):0;
      const ago  =diff<60?`${diff}m`:diff<1440?`${Math.floor(diff/60)}h`:`${Math.floor(diff/1440)}d`;
      const hits =tickers.filter(t=>title.toUpperCase().includes(t)||desc.toUpperCase().includes(t));
      const sent =/surge|soar|beat|win|gain|jump|rise|bull|record|rally|strong|boost/i.test(title)?"bullish"
                 :/fall|drop|miss|cut|warn|bear|decline|weak|loss|slide|disappoint/i.test(title)?"bearish":"neutral";
      return{title,link,ago,desc,tickers:hits,sent,src:"Yahoo Finance"};
    });
  }catch(e){return[];}
}

async function fetchFinnhubNews(tickers){
  const from=weekAgo(),to=today(),all=[],seen=new Set();
  for(const sym of tickers.slice(0,6)){
    try{
      const r=await fetch(`${FINNHUB}/company-news?symbol=${sym}&from=${from}&to=${to}&token=${FKEY}`,{signal:AbortSignal.timeout(7000)});
      const d=await r.json();
      if(Array.isArray(d)) d.forEach(n=>{
        if(!seen.has(n.id)){
          seen.add(n.id);
          const diff=Math.floor((Date.now()-n.datetime*1000)/60000);
          const ago=diff<60?`${diff}m`:diff<1440?`${Math.floor(diff/60)}h`:`${Math.floor(diff/1440)}d`;
          const sent=/surge|soar|beat|win|gain|jump|rise|bull|record|rally/i.test(n.headline)?"bullish"
                    :/fall|drop|miss|cut|warn|bear|decline|weak|loss|slide/i.test(n.headline)?"bearish":"neutral";
          all.push({title:n.headline,link:n.url,ago,desc:n.summary||"",tickers:[sym],sent,src:"Finnhub"});
        }
      });
    }catch(e){}
    await new Promise(r=>setTimeout(r,220));
  }
  return all;
}

async function claudeCall(system,user,maxTokens=900){
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages:[{role:"user",content:user}]})
    });
    const d=await r.json();
    return d.content?.[0]?.text??"";
  }catch(e){return"";}
}

// ── UI Atoms ─────────────────────────────────────────────────────────────────

const Spin=({sz=14})=><span style={{display:"inline-block",animation:"spin .7s linear infinite",fontSize:sz,lineHeight:1}}>◌</span>;

function Dot({color="#34d399",pulse=false}){
  return<span style={{position:"relative",display:"inline-flex",width:8,height:8,flexShrink:0}}>
    {pulse&&<span style={{position:"absolute",inset:0,borderRadius:"50%",background:color,animation:"rip 1.8s ease-out infinite"}}/>}
    <span style={{position:"absolute",inset:0,borderRadius:"50%",background:color}}/>
  </span>;
}

function Pct({v,sm}){
  if(v==null) return<span style={{color:"#334155",fontSize:sm?9:11}}>—</span>;
  return<span style={{display:"inline-block",padding:sm?"1px 5px":"2px 7px",borderRadius:4,fontWeight:800,fontSize:sm?10:12,fontVariantNumeric:"tabular-nums",
    background:v>0?"rgba(52,211,153,.12)":v<0?"rgba(248,113,113,.12)":"rgba(148,163,184,.08)",
    color:v>0?"#34d399":v<0?"#f87171":"#94a3b8",
    border:`1px solid ${v>0?"rgba(52,211,153,.22)":v<0?"rgba(248,113,113,.22)":"rgba(255,255,255,.07)"}`
  }}>{v>0?"+":""}{f(v)}%</span>;
}

function SentBadge({s}){
  const m={bullish:{c:"#34d399",t:"▲ Bullish"},bearish:{c:"#f87171",t:"▼ Bearish"},neutral:{c:"#64748b",t:"◆ Neutral"}};
  const x=m[s]||m.neutral;
  return<span style={{fontSize:10,fontWeight:700,padding:"1px 6px",borderRadius:3,background:`${x.c}12`,color:x.c,border:`1px solid ${x.c}25`}}>{x.t}</span>;
}

function SessionBadge(){
  const[s,setS]=useState(getSession());
  useEffect(()=>{const id=setInterval(()=>setS(getSession()),15000);return()=>clearInterval(id);},[]);
  return<span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"3px 10px",borderRadius:20,
    background:`${s.color}15`,border:`1px solid ${s.color}28`,fontSize:10,fontWeight:700,color:s.color}}>
    <Dot color={s.color} pulse={s.code==="open"}/>{s.label}
  </span>;
}

// ── LIVE TAB ──────────────────────────────────────────────────────────────────
function LiveTab({tickers,stockMeta,sectors}){
  const[quotes,setQuotes]=useState({});
  const[loading,setLoading]=useState(false);
  const[prog,setProg]=useState([0,0]);
  const[lastUpd,setLastUpd]=useState(null);
  const[sort,setSort]=useState("ticker");
  const[sel,setSel]=useState(null);
  const[search,setSearch]=useState("");
  const timer=useRef();
  const session=getSession();

  const load=useCallback(async()=>{
    if(loading) return;
    setLoading(true);
    const map={};
    for(let i=0;i<tickers.length;i++){
      const q=await fetchQuote(tickers[i]);
      map[q.ticker]=q;
      setProg([i+1,tickers.length]);
    }
    setQuotes(map);setLastUpd(new Date());setLoading(false);setProg([0,0]);
  },[tickers.join(",")]);

  useEffect(()=>{load();timer.current=setInterval(load,30000);return()=>clearInterval(timer.current);},[load]);

  const rows=tickers
    .filter(t=>!search||t.includes(search.toUpperCase())||(stockMeta[t]?.n||"").toLowerCase().includes(search.toLowerCase()))
    .map(t=>quotes[t]||{ticker:t,ok:false})
    .sort((a,b)=>sort==="pct"?(b.chgPct??-999)-(a.chgPct??-999):sort==="pctAsc"?(a.chgPct??999)-(b.chgPct??999):sort==="price"?(b.price??0)-(a.price??0):a.ticker.localeCompare(b.ticker));

  const gain=rows.filter(q=>q.chgPct>0).length;
  const lose=rows.filter(q=>q.chgPct<0).length;
  const live=rows.filter(q=>q.ok).length;

  return<div>
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <SessionBadge/>
      {live>0&&<>
        <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.18)",color:"#34d399",fontWeight:700}}>▲ {gain}</span>
        <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:"rgba(248,113,113,.08)",border:"1px solid rgba(248,113,113,.18)",color:"#f87171",fontWeight:700}}>▼ {lose}</span>
        <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:"rgba(34,211,238,.07)",border:"1px solid rgba(34,211,238,.15)",color:"#22d3ee"}}>🔴 {live}/{tickers.length} LIVE</span>
      </>}
      {loading&&prog[1]>0&&<span style={{fontSize:10,color:"#475569",display:"flex",alignItems:"center",gap:4}}><Spin sz={11}/>{prog[0]}/{prog[1]}</span>}
      <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
        {lastUpd&&<span style={{fontSize:9,color:"#1e3a4a"}}>Updated {lastUpd.toLocaleTimeString()} · ↺30s</span>}
        <button onClick={load} disabled={loading} style={{padding:"3px 9px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:4,color:"#475569",cursor:"pointer",fontSize:10,fontWeight:700}}>{loading?<Spin sz={11}/>:"↺"}</button>
      </div>
    </div>

    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..."
        style={{padding:"5px 9px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.08)",borderRadius:4,color:"#f1f5f9",fontSize:11,width:110}}/>
      {[["ticker","A-Z"],["pct","▲ Gainers"],["pctAsc","▼ Losers"],["price","Price"]].map(([k,l])=>
        <button key={k} onClick={()=>setSort(k)} style={{padding:"4px 9px",borderRadius:4,cursor:"pointer",fontSize:10,fontWeight:700,
          background:sort===k?"rgba(34,211,238,.1)":"transparent",
          border:`1px solid ${sort===k?"rgba(34,211,238,.28)":"rgba(255,255,255,.07)"}`,
          color:sort===k?"#22d3ee":"#475569"}}>{l}</button>
      )}
    </div>

    <div style={{display:"grid",gridTemplateColumns:"96px 1fr 90px 78px 72px 54px 60px",gap:6,padding:"4px 12px",borderBottom:"1px solid rgba(255,255,255,.05)",marginBottom:2}}>
      {["Ticker","Sectors","Price","Change $","% Day","H/L","Vol"].map((h,i)=>
        <div key={i} style={{fontSize:9,color:"#1e3a4a",fontWeight:700,textAlign:i>=2?"right":"left"}}>{h}</div>
      )}
    </div>

    <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.06)",borderRadius:8,overflow:"hidden"}}>
      {!lastUpd&&loading?(
        <div style={{textAlign:"center",padding:60,color:"#334155"}}>
          <div style={{marginBottom:10,fontSize:28}}><Spin sz={28}/></div>
          <div style={{fontSize:12}}>Loading live prices from Yahoo Finance...</div>
          {prog[1]>0&&<div style={{fontSize:10,marginTop:4,color:"#1e3a4a"}}>{prog[0]}/{prog[1]}</div>}
        </div>
      ):rows.map((q,idx)=>{
        const open=sel===q.ticker;
        const secs=Object.entries(sectors).filter(([,v])=>v.t.includes(q.ticker));
        const extPrice=session.code==="pre"?q.pre:session.code==="after"?q.after:null;
        const extLabel=session.code==="pre"?"PRE":"AH";
        const extColor=session.code==="pre"?"#fbbf24":"#60a5fa";
        return<div key={q.ticker}>
          <div onClick={()=>setSel(open?null:q.ticker)}
            style={{display:"grid",gridTemplateColumns:"96px 1fr 90px 78px 72px 54px 60px",gap:6,padding:"9px 12px",cursor:"pointer",alignItems:"center",
              background:open?"rgba(34,211,238,.05)":idx%2?"rgba(255,255,255,.01)":"transparent",
              borderBottom:"1px solid rgba(255,255,255,.03)",transition:"background .1s"}}
            onMouseEnter={e=>{if(!open)e.currentTarget.style.background="rgba(255,255,255,.04)";}}
            onMouseLeave={e=>{if(!open)e.currentTarget.style.background=idx%2?"rgba(255,255,255,.01)":"transparent";}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <span style={{fontSize:13,fontWeight:900,color:open?"#22d3ee":"#f1f5f9",letterSpacing:.8}}>{q.ticker}</span>
                {q.ok&&<span style={{width:5,height:5,borderRadius:"50%",background:q.src==="Yahoo"?"#34d399":"#22d3ee",display:"inline-block"}} title={q.src}/>}
              </div>
              <div style={{fontSize:9,color:"#1e3a4a",marginTop:1,maxWidth:88,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{stockMeta[q.ticker]?.n||""}</div>
            </div>
            <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
              {secs.slice(0,4).map(([nm,d])=><span key={nm} title={nm} style={{fontSize:11,color:d.c}}>{d.i}</span>)}
            </div>
            <div style={{textAlign:"right"}}>
              {q.ok?(
                <><div style={{fontSize:13,fontWeight:700,color:"#f1f5f9",fontVariantNumeric:"tabular-nums"}}>${f(q.price)}</div>
                {extPrice!=null&&<div style={{fontSize:9,fontWeight:700,color:extColor}}>{extLabel} ${f(extPrice)}</div>}</>
              ):<div style={{fontSize:10,color:"#1e3a4a"}}>—</div>}
            </div>
            <div style={{textAlign:"right",fontSize:12,fontWeight:700,color:pClr(q.chg),fontVariantNumeric:"tabular-nums"}}>{q.chg!=null?`${q.chg>0?"+":""}${f(q.chg)}`:"—"}</div>
            <div style={{textAlign:"right"}}><Pct v={q.chgPct}/></div>
            <div style={{textAlign:"right",fontSize:9,lineHeight:1.5}}>
              {q.high!=null&&<div style={{color:"rgba(52,211,153,.6)"}}>${f(q.high)}</div>}
              {q.low!=null&&<div style={{color:"rgba(248,113,113,.6)"}}>${f(q.low)}</div>}
            </div>
            <div style={{textAlign:"right",fontSize:10,color:"#334155"}}>{fv(q.vol)}</div>
          </div>
          {open&&<div style={{padding:"12px 14px",background:"rgba(34,211,238,.04)",borderBottom:"1px solid rgba(34,211,238,.08)"}}>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(115px,1fr))",gap:7,marginBottom:8}}>
              {[["Price",q.price!=null?`$${f(q.price)}`:null,"#f1f5f9"],
                ["Change $",q.chg!=null?`${q.chg>0?"+":""}${f(q.chg)}`:null,pClr(q.chg)],
                ["Day %",q.chgPct!=null?`${q.chgPct>0?"+":""}${f(q.chgPct)}%`:null,pClr(q.chgPct)],
                ["Prev Close",q.prev!=null?`$${f(q.prev)}`:null,"#94a3b8"],
                q.high!=null?["Day High",`$${f(q.high)}`,"rgba(52,211,153,.8)"]:null,
                q.low!=null?["Day Low",`$${f(q.low)}`,"rgba(248,113,113,.8)"]:null,
                q.pre!=null?["Pre-Market",`$${f(q.pre)}`,"#fbbf24"]:null,
                q.after!=null?["After Hours",`$${f(q.after)}`,"#60a5fa"]:null,
                q.vol!=null?["Volume",fv(q.vol),"#64748b"]:null,
              ].filter(Boolean).filter(x=>x[1]!=null).map(([lb,val,c])=>
                <div key={lb} style={{padding:"7px 9px",background:"rgba(0,0,0,.25)",borderRadius:5}}>
                  <div style={{fontSize:8,color:"#334155",letterSpacing:.5,marginBottom:2}}>{lb}</div>
                  <div style={{fontSize:13,fontWeight:700,color:c,fontVariantNumeric:"tabular-nums"}}>{val}</div>
                </div>
              )}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#334155"}}>
              <span>Source: {q.src||"—"}</span>
            </div>
            {stockMeta[q.ticker]?.a&&<div style={{marginTop:8,fontSize:11,color:"#475569"}}>💡 {stockMeta[q.ticker].a}</div>}
          </div>}
        </div>;
      })}
    </div>
    <div style={{marginTop:7,fontSize:9,color:"#1e3a4a",textAlign:"center"}}>Yahoo Finance + Finnhub · Up to 15min delay · Green dot = Yahoo · Blue dot = Finnhub</div>
  </div>;
}

function NewsTab({tickers}){
  const[news,setNews]=useState([]);

  const[lastUpd,setLastUpd]=useState(null);
  const[src,setSrc]=useState("");

  const load=useCallback(async()=>{
    if(loading) return;

    setLoading(false);
  },[tickers.join(",")]);

  useEffect(()=>{load();const id=setInterval(load,120000);return()=>clearInterval(id);},[load]);

  const filtered=news.filter(n=>(sent==="all"||n.sent===sent)&&(!tickF||n.tickers.some(t=>t.includes(tickF.toUpperCase()))||n.title.toLowerCase().includes(tickF.toLowerCase())));

            border:`1px solid ${sent===k?(k==="bullish"?"rgba(52,211,153,.3)":k==="bearish"?"rgba(248,113,113,.3)":"rgba(255,255,255,.15)"):"rgba(255,255,255,.07)"}`,
            color:sent===k?(k==="bullish"?"#34d399":k==="bearish"?"#f87171":"#f1f5f9"):"#475569"}}>{l}</button>

    {filtered.map((item,i)=>{
      const bc=item.sent==="bullish"?"#34d399":item.sent==="bearish"?"#f87171":"#64748b";
      return<a key={i} href={item.link} target="_blank" rel="noopener noreferrer"

function CompareTab({tickers,sectors,metaState}){
  const[sel,setSel]=useState([]);
  const[res,setRes]=useState(null);
  const[loading,setLoading]=useState(false);
  const toggle=t=>setSel(p=>p.includes(t)?p.filter(x=>x!==t):p.length<4?[...p,t]:p);

  const run=async()=>{
    if(sel.length<2) return;
    setLoading(true);setRes(null);
    const sn=Object.entries(sectors).find(([,v])=>sel.every(t=>v.t.includes(t)))?.[0]||Object.entries(sectors).find(([,v])=>sel.some(t=>v.t.includes(t)))?.[0]||"General";
    const sys=`Financial analyst. Return ONLY valid JSON: {"items":[{"ticker":"X","strength":"text","weakness":"text","bestFor":"text","score":7}],"verdict":"2 sentence summary"}`;
    const txt=await claudeCall(sys,`Compare ${sel.join(",")} in sector: ${sn}`);
    try{const m=txt.match(/\{[\s\S]*\}/);setRes(m?JSON.parse(m[0]):null);}catch(e){setRes(null);}
    setLoading(false);
  };

  if(res) return<div>
    <button onClick={()=>{setRes(null);setSel([]);}} style={{marginBottom:12,padding:"5px 11px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:4,color:"#64748b",cursor:"pointer",fontSize:10}}>← Back</button>
    <div style={{display:"grid",gridTemplateColumns:`repeat(${res.items?.length||2},1fr)`,gap:10,marginBottom:12}}>
      {(res.items||[]).map(item=><div key={item.ticker} style={{padding:"14px 13px",background:"rgba(255,255,255,.025)",border:"1px solid rgba(255,255,255,.07)",borderRadius:8}}>
        <div style={{fontSize:20,fontWeight:900,color:"#f1f5f9",letterSpacing:1.5,marginBottom:4}}>{item.ticker}</div>
        <div style={{display:"flex",gap:2,marginBottom:10}}>{Array.from({length:10}).map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:1,background:i<item.score?"#22d3ee":"rgba(255,255,255,.07)"}}/>)}</div>
        {[["STRENGTH","#34d399",item.strength],["WEAKNESS","#f87171",item.weakness],["BEST FOR","#fbbf24",item.bestFor]].map(([lb,c,v])=>
          <div key={lb} style={{marginBottom:7}}>
            <div style={{fontSize:8,color:c,fontWeight:700,letterSpacing:.8,marginBottom:2}}>{lb}</div>
            <div style={{fontSize:11,color:"#cbd5e1",lineHeight:1.5}}>{v}</div>
          </div>
        )}
      </div>)}
    </div>
    <div style={{padding:"12px 14px",background:"rgba(34,211,238,.05)",border:"1px solid rgba(34,211,238,.18)",borderRadius:7,fontSize:12,color:"#94a3b8",lineHeight:1.7}}>{res.verdict}</div>
  </div>;

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>
      <span style={{fontSize:10,color:"#334155"}}>Select 2–4 stocks to compare with AI</span>
      {sel.length>=2&&<button onClick={run} disabled={loading} style={{padding:"6px 15px",background:"#22d3ee",border:"none",borderRadius:5,color:"#000",fontWeight:800,cursor:"pointer",fontSize:11}}>{loading?<Spin/>:"Compare ▶"}</button>}
    </div>
    {sel.length>0&&<div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
      {sel.map(t=><span key={t} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 8px",background:"rgba(34,211,238,.1)",border:"1px solid rgba(34,211,238,.28)",borderRadius:4,fontSize:11,fontWeight:800,color:"#22d3ee"}}>
        {t}<span onClick={()=>toggle(t)} style={{cursor:"pointer",color:"#475569"}}>✕</span>
      </span>)}
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(105px,1fr))",gap:6}}>
      {tickers.map(t=>{
        const isSel=sel.includes(t);
        const secs=Object.entries(sectors).filter(([,v])=>v.t.includes(t));
        return<div key={t} onClick={()=>toggle(t)} style={{padding:"9px 10px",borderRadius:6,cursor:"pointer",
          background:isSel?"rgba(34,211,238,.09)":"rgba(255,255,255,.02)",
          border:`1px solid ${isSel?"rgba(34,211,238,.32)":"rgba(255,255,255,.06)"}`,transition:"all .12s"}}>
          <div style={{fontSize:13,fontWeight:900,color:isSel?"#22d3ee":"#f1f5f9",letterSpacing:.8}}>{t}</div>
          <div style={{fontSize:9,color:"#1e3a4a",marginTop:1}}>{metaState[t]?.n||""}</div>
          <div style={{display:"flex",gap:2,marginTop:4}}>{secs.slice(0,3).map(([,d])=><span key={d.i} style={{fontSize:9,color:d.c}}>{d.i}</span>)}</div>
        </div>;
      })}
    </div>
  </div>;
}

// ── MANAGE TAB ────────────────────────────────────────────────────────────────
function ManageTab({tickers,sectors,metaState,added,onAdd,onRemove}){
  const[input,setInput]=useState("");
  const[checking,setChecking]=useState(false);
  const[validated,setValidated]=useState(null);
  const[err,setErr]=useState("");

  const check=async()=>{
    const t=input.trim().toUpperCase();
    if(!t){setErr("Enter a ticker");return;}
    if(tickers.includes(t)){setErr(`${t} already exists`);return;}
    setChecking(true);setErr("");setValidated(null);
    const q=await fetchQuote(t);
    setChecking(false);
    if(q.ok) setValidated(q);
    else setErr(`"${t}" not found — check the symbol`);
  };

  const confirm=()=>{
    if(!validated) return;
    onAdd(validated.ticker,validated.name||validated.ticker);
    setInput("");setValidated(null);setErr("");
  };

  return<div>
    <div style={{padding:"16px",background:"rgba(34,211,238,.04)",border:"1px solid rgba(34,211,238,.14)",borderRadius:9,marginBottom:18}}>
      <div style={{fontSize:12,fontWeight:700,color:"#22d3ee",marginBottom:3}}>Add Ticker</div>
      <div style={{fontSize:10,color:"#334155",marginBottom:10}}>Verified in real-time via Yahoo Finance</div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:8}}>
        <input value={input} onChange={e=>{setInput(e.target.value.toUpperCase());setErr("");setValidated(null);}}
          onKeyDown={e=>e.key==="Enter"&&check()} placeholder="MRVL, ARM, SMCI..."
          style={{padding:"7px 11px",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.11)",borderRadius:5,color:"#f1f5f9",fontSize:13,fontWeight:800,letterSpacing:1.5,width:155}}/>
        <button onClick={check} disabled={checking||!input.trim()} style={{padding:"7px 14px",background:"#22d3ee",border:"none",borderRadius:5,color:"#000",fontWeight:800,cursor:"pointer",fontSize:11,opacity:!input.trim()?0.4:1}}>{checking?<Spin/>:"Check ↗"}</button>
        {validated&&<button onClick={confirm} style={{padding:"7px 14px",background:"#34d399",border:"none",borderRadius:5,color:"#000",fontWeight:800,cursor:"pointer",fontSize:11}}>✓ Add {validated.ticker}</button>}
      </div>
      {err&&<div style={{fontSize:11,color:"#f87171",marginBottom:6}}>{err}</div>}
      {validated&&<div style={{display:"inline-flex",gap:10,padding:"7px 11px",background:"rgba(52,211,153,.08)",border:"1px solid rgba(52,211,153,.2)",borderRadius:5,alignItems:"center"}}>
        <span style={{fontSize:13,fontWeight:900,color:"#34d399",letterSpacing:1}}>{validated.ticker}</span>
        <span style={{fontSize:11,color:"#64748b"}}>{validated.name}</span>
        <span style={{fontSize:12,fontWeight:700,color:"#f1f5f9"}}>${f(validated.price)}</span>
        <Pct v={validated.chgPct} sm/>
      </div>}
    </div>

    {added.length>0&&<div style={{marginBottom:14,padding:"11px 13px",background:"rgba(52,211,153,.04)",border:"1px solid rgba(52,211,153,.13)",borderRadius:7}}>
      <div style={{fontSize:9,color:"#34d399",fontWeight:700,marginBottom:7}}>★ Added by you ({added.length})</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        {added.map(t=><span key={t} style={{display:"inline-flex",alignItems:"center",gap:5,padding:"2px 7px",background:"rgba(52,211,153,.1)",border:"1px solid rgba(52,211,153,.22)",borderRadius:4,fontSize:10,fontWeight:800,color:"#34d399"}}>
          {t}<span onClick={()=>onRemove(t)} style={{cursor:"pointer",color:"#475569",fontSize:11}}>✕</span>
        </span>)}
      </div>
    </div>}

    <div style={{fontSize:9,color:"#1e3a4a",marginBottom:8}}>All tickers ({tickers.length})</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(105px,1fr))",gap:5}}>
      {tickers.map(t=>{
        const secs=Object.entries(sectors).filter(([,v])=>v.t.includes(t));
        const isNew=added.includes(t);
        return<div key={t} style={{padding:"8px 10px",borderRadius:5,background:isNew?"rgba(52,211,153,.05)":"rgba(255,255,255,.02)",border:`1px solid ${isNew?"rgba(52,211,153,.15)":"rgba(255,255,255,.055)"}`}}>
          <div style={{fontSize:12,fontWeight:900,color:isNew?"#34d399":"#e2e8f0",letterSpacing:.8}}>{t}</div>
          <div style={{fontSize:8,color:"#1e3a4a",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{metaState[t]?.n||""}</div>
          <div style={{display:"flex",gap:2,marginTop:4}}>{secs.slice(0,3).map(([,d])=><span key={d.i} style={{fontSize:9,color:d.c}}>{d.i}</span>)}</div>
        </div>;
      })}
    </div>
  </div>;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[tickers,setTickers]=useState([...TICKERS_INIT]);
  const[sectors,setSectors]=useState({...SECTORS});
  const[metaState,setMetaState]=useState({...META});
  const[added,setAdded]=useState([]);
  const[tab,setTab]=useState("live");

  const onAdd=(ticker,name)=>{
    if(!tickers.includes(ticker)){setTickers(p=>[...p,ticker]);setAdded(p=>[...p,ticker]);}
    if(!metaState[ticker]) setMetaState(p=>({...p,[ticker]:{n:name,a:""}}));
  };
  const onRemove=t=>{setTickers(p=>p.filter(x=>x!==t));setAdded(p=>p.filter(x=>x!==t));};

  const TABS=[{id:"live",icon:"⚡",label:"Live"},{id:"news",icon:"📡",label:"News"},{id:"sectors",icon:"⬡",label:"Sectors"},{id:"compare",icon:"⚖️",label:"Compare"},{id:"ai",icon:"◑",label:"AI"},{id:"manage",icon:"⚙",label:"Manage"}];

  return<div style={{minHeight:"100vh",background:"#060a10",color:"#e2e8f0",fontFamily:"'Courier New','Consolas',monospace"}}>
    <div style={{background:"#080c15",borderBottom:"1px solid rgba(255,255,255,.07)",position:"sticky",top:0,zIndex:60,backdropFilter:"blur(12px)"}}>
      <div style={{maxWidth:1200,margin:"0 auto",padding:"0 16px"}}>
        <div style={{display:"flex",alignItems:"center",height:50,gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{width:28,height:28,borderRadius:6,background:"linear-gradient(135deg,#22d3ee,#818cf8)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:900,color:"#000"}}>R</div>
            <span style={{fontSize:15,fontWeight:900,letterSpacing:3.5,color:"#f1f5f9"}}>RADAR</span>
          </div>
          <SessionBadge/>
          <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:9,color:"#1e3a4a",padding:"2px 6px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.06)",borderRadius:3}}>{tickers.length} tickers</span>
            <span style={{fontSize:9,padding:"2px 6px",background:"rgba(34,211,238,.07)",border:"1px solid rgba(34,211,238,.18)",borderRadius:3,color:"#22d3ee",fontWeight:700}}>Yahoo + Finnhub</span>
          </div>
        </div>
        <div style={{display:"flex",gap:0}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 13px",background:"none",border:"none",
            borderBottom:tab===t.id?"2px solid #22d3ee":"2px solid transparent",
            color:tab===t.id?"#22d3ee":"#475569",cursor:"pointer",fontSize:11,fontWeight:700,transition:"color .12s"}}>
            <span style={{fontSize:12}}>{t.icon}</span><span>{t.label}</span>
          </button>)}
        </div>
      </div>
    </div>
    <div style={{maxWidth:1200,margin:"0 auto",padding:"18px 16px"}}>
      {tab==="live"    &&<LiveTab    tickers={tickers} stockMeta={metaState} sectors={sectors}/>}
      {tab==="news"    &&<NewsTab    tickers={tickers}/>}
      {tab==="sectors" &&<SectorsTab tickers={tickers} sectors={sectors} setSectors={setSectors} setTickers={setTickers} metaState={metaState} setMetaState={setMetaState}/>}
      {tab==="compare" &&<CompareTab tickers={tickers} sectors={sectors} metaState={metaState}/>}
      {tab==="ai"      &&<AITab      tickers={tickers} sectors={sectors}/>}
      {tab==="manage"  &&<ManageTab  tickers={tickers} sectors={sectors} metaState={metaState} added={added} onAdd={onAdd} onRemove={onRemove}/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
